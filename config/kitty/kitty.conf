# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Emoji / symbols: kitty uses fontconfig fallback automatically.
# If you see broken emoji, ensure noto-fonts-emoji is installed and fc-cache ran.

# --- Rendering ---
allow_hidpi     yes
text_composition_strategy legacy
box_drawing_scale 0.001, 1, 1.5, 2

# --- UI ---
background_opacity 1.0
confirm_os_window_close 0

# Remove “top empty space” feeling:
window_padding_width 6
placement_strategy top-left
remember_window_size yes

# Tabs (optional)
tab_bar_style powerline
tab_powerline_style slanted

# Scrollback + paging feel
scrollback_lines 20000
mouse_hide_wait 0

# Keybinds: Page scroll
map ctrl+shift+up    scroll_page_up
map ctrl+shift+down  scroll_page_down
map ctrl+shift+home  scroll_home
map ctrl+shift+end   scroll_end

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

